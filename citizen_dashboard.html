<!DOCTYPE html>
<html>
<head>
<title>Citizen Dashboard - RapidEco</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#7dba3f;--green-bright:#9be15d;--bg:#0f1a0f;--card:#1c2a0c;--border:#2e4414;--text:#e8f5d0;--muted:#8aac60;}

body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* Top Bar */
.topbar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 25px;background:rgba(15,26,15,0.95);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
}
.logo{font-size:22px;font-weight:bold;color:var(--green-bright);}
.logo span{color:white;}
.topbar-right{display:flex;gap:15px;align-items:center;}
.profile-icon{
    display:flex;align-items:center;gap:8px;
    background:var(--card);padding:8px 16px;border-radius:25px;
    border:1px solid var(--border);cursor:pointer;
    transition:all 0.2s;
}
.profile-icon:hover{border-color:var(--green);}
.profile-icon i{font-size:18px;color:var(--green-bright);}
.logout-btn{
    background:#dc3545;border:none;padding:8px 16px;
    border-radius:25px;color:white;cursor:pointer;font-weight:bold;
}
.logout-btn:hover{background:#c82333;}

/* Main Layout */
.main-container{display:flex;height:100vh;padding-top:60px;}
.sidebar{
    width:380px;background:var(--card);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
}
.tab-header{
    display:flex;border-bottom:1px solid var(--border);
}
.tab-btn{
    flex:1;padding:15px;background:transparent;border:none;
    color:var(--muted);font-weight:bold;cursor:pointer;
    transition:all 0.2s;font-size:14px;
}
.tab-btn.active{
    color:var(--green-bright);border-bottom:2px solid var(--green-bright);
    background:rgba(125,186,63,0.1);
}
.tab-content{
    flex:1;overflow-y:auto;padding:20px;
    display:none;
}
.tab-content.active{display:block;}

/* Form Styles */
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.form-group input,.form-group textarea,.form-group select{
    width:100%;padding:10px;background:#131f0e;border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--green);}
.btn-submit{
    background:linear-gradient(135deg,var(--green),var(--green-bright));
    color:#0f1a0f;padding:12px;border:none;border-radius:8px;
    font-weight:bold;cursor:pointer;width:100%;font-size:14px;margin-top:10px;
}
.btn-submit:hover{opacity:0.9;}

/* Camera */
.camera-preview{background:#0a100a;border-radius:8px;padding:10px;margin-top:10px;}
#cameraVideo{width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:none;}
#capturedPreview{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;}
.camera-buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cam-btn{
    flex:1;padding:8px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;font-size:12px;
}
.cam-open{background:var(--green);color:#0f1a0f;}
.cam-capture{background:#2b6cb0;color:white;}
.cam-close{background:#dc3545;color:white;}

/* Route Planner */
.route-input{margin-bottom:12px;}
.route-input input{
    width:100%;padding:10px;background:#131f0e;border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:13px;
}
.route-buttons{display:flex;gap:10px;margin-bottom:15px;}
.route-buttons button{
    flex:1;padding:10px;background:var(--card2);border:1px solid var(--border);
    border-radius:8px;color:var(--text);cursor:pointer;font-weight:bold;
}
.route-buttons button:hover{border-color:var(--green);}
.find-route-btn{
    background:var(--green);color:#0f1a0f;padding:12px;border:none;
    border-radius:8px;font-weight:bold;cursor:pointer;width:100%;
}
.route-result{margin-top:15px;display:none;}
.route-option{
    background:rgba(0,0,0,0.3);border-radius:8px;padding:12px;
    margin-bottom:8px;cursor:pointer;transition:all 0.2s;
}
.route-option:hover{background:rgba(125,186,63,0.2);}
.route-option.recommended{border-left:3px solid var(--green);background:rgba(125,186,63,0.1);}
.route-name{font-weight:bold;margin-bottom:5px;}
.route-details{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;}
.route-warning{font-size:11px;color:#ff8888;margin-top:5px;}

/* Right Content */
.content-area{flex:1;padding:15px;display:flex;flex-direction:column;gap:15px;}
.map-container{
    background:var(--card);border-radius:12px;overflow:hidden;
    border:1px solid var(--border);flex:1;
}
.map-header{
    padding:10px 15px;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
}
.map-header h3{font-size:14px;color:var(--green-bright);}
.live-badge{font-size:11px;color:var(--muted);}
.live-badge i{color:#ff4444;font-size:8px;margin-right:4px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#mainMap{height:calc(100vh - 160px);width:100%;}

/* Toast */
.toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#28a745;color:white;padding:12px 24px;
    border-radius:8px;z-index:1000;display:none;font-size:14px;
}

/* Scrollbar */
.sidebar::-webkit-scrollbar{width:5px;}
.sidebar::-webkit-scrollbar-track{background:var(--bg);}
.sidebar::-webkit-scrollbar-thumb{background:var(--green);border-radius:5px;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">🌱 Rapid<span>Eco</span></div>
    <div class="topbar-right">
        <div class="profile-icon" onclick="window.location.href='profile.html'">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Profile</span>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-container">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <div class="tab-header">
            <button class="tab-btn active" onclick="switchTab('route')"><i class="fas fa-route"></i> Route Planner</button>
            <button class="tab-btn" onclick="switchTab('waste')"><i class="fas fa-trash-alt"></i> Waste Report</button>
            <button class="tab-btn" onclick="switchTab('traffic')"><i class="fas fa-traffic-light"></i> Traffic Report</button>
        </div>

        <!-- Route Planner Tab -->
        <div id="routeTab" class="tab-content active">
            <h3 style="color:var(--green-bright);margin-bottom:15px;"><i class="fas fa-map-marked-alt"></i> Smart Route Planner</h3>
            <div class="route-input">
                <label style="font-size:12px;color:var(--muted);">📍 Starting Point</label>
                <input type="text" id="routeStart" placeholder="Enter address (e.g., Hyderabad Central)">
                <button class="route-buttons" style="margin-top:5px;" onclick="useCurrentLocation()"><i class="fas fa-location-dot"></i> Use My Current Location</button>
            </div>
            <div class="route-input">
                <label style="font-size:12px;color:var(--muted);">🎯 Destination</label>
                <input type="text" id="routeEnd" placeholder="Enter address (e.g., Gachibowli)">
            </div>
            <button class="find-route-btn" onclick="findOptimalRoute()"><i class="fas fa-search"></i> Find Best Route</button>
            <div id="routeResultPanel" class="route-result"></div>
            <div style="margin-top:15px;font-size:11px;color:var(--muted);text-align:center;">
                <i class="fas fa-info-circle"></i> Click on any route to view on map
            </div>
        </div>

        <!-- Waste Report Tab -->
        <div id="wasteTab" class="tab-content">
            <h3 style="color:var(--green-bright);margin-bottom:15px;"><i class="fas fa-trash-alt"></i> Report Waste Issue</h3>
            <div class="form-group">
                <label>Description</label>
                <textarea id="wasteDesc" rows="3" placeholder="Describe the waste problem..."></textarea>
            </div>
            <div class="form-group">
                <label>Location (Click on map to mark)</label>
                <input id="wasteLoc" placeholder="Click on the map to set location" readonly>
            </div>
            <div class="form-group">
                <label>Photo Evidence</label>
                <div class="camera-preview">
                    <video id="cameraVideo" autoplay playsinline></video>
                    <img id="capturedPreview">
                    <div class="camera-buttons">
                        <button class="cam-btn cam-open" onclick="openCamera()"><i class="fas fa-camera"></i> Open Camera</button>
                        <button class="cam-btn cam-capture" onclick="capturePhoto()" style="display:none;" id="captureBtn">📸 Capture</button>
                        <button class="cam-btn cam-close" onclick="closeCamera()" style="display:none;" id="closeCamBtn">✕ Close</button>
                    </div>
                    <input type="file" id="galleryInput" accept="image/*" style="display:none;" onchange="handleGalleryUpload(event)">
                    <button class="cam-btn cam-open" style="margin-top:8px;width:100%;" onclick="document.getElementById('galleryInput').click()">
                        <i class="fas fa-images"></i> Upload from Gallery
                    </button>
                </div>
            </div>
            <button class="btn-submit" onclick="submitWaste()"><i class="fas fa-paper-plane"></i> Submit Waste Report</button>
        </div>

        <!-- Traffic Report Tab -->
        <div id="trafficTab" class="tab-content">
            <h3 style="color:var(--green-bright);margin-bottom:15px;"><i class="fas fa-traffic-light"></i> Report Traffic Issue</h3>
            <div class="form-group">
                <label>Event Name</label>
                <input id="trafficName" placeholder="e.g., Accident at Main Road, Political Rally">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="trafficDesc" rows="2" placeholder="Describe the traffic situation..."></textarea>
            </div>
            <div class="form-group">
                <label>Expected Crowd/Vehicles</label>
                <input id="trafficCrowd" placeholder="e.g., 500+ vehicles, 1000+ people">
            </div>
            <div class="form-group">
                <label>Location (Click on map to mark)</label>
                <input id="trafficLoc" placeholder="Click on the map to set location" readonly>
            </div>
            <button class="btn-submit" onclick="submitTraffic()"><i class="fas fa-paper-plane"></i> Submit Traffic Report</button>
        </div>
    </div>

    <!-- RIGHT CONTENT - MAP -->
    <div class="content-area">
        <div class="map-container">
            <div class="map-header">
                <h3><i class="fas fa-map-marked-alt"></i> Live Map</h3>
                <div class="live-badge"><i class="fas fa-circle"></i> Click on map to mark location</div>
            </div>
            <div id="mainMap"></div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'http://localhost:5000';
let mainMap, routingMap;
let selectedMarker = null;
let cameraStream = null;
let capturedImage = null;
let currentRoutes = [];
let drawnRoute = null;
let trafficMarkers = [];
let wasteMarkers = [];

const user = JSON.parse(localStorage.getItem('currentUser'));
if (!user || user.role !== 'Citizen') window.location.href = 'login_page.html';

document.getElementById('userName').innerHTML = `<i class="fas fa-user"></i> ${user.name.split(' ')[0]}`;

function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#dc3545' : '#28a745';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login_page.html';
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    if(tab === 'route') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('routeTab').classList.add('active');
    } else if(tab === 'waste') {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('wasteTab').classList.add('active');
    } else if(tab === 'traffic') {
        document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
        document.getElementById('trafficTab').classList.add('active');
    }
}

// Initialize Map
function initMap() {
    mainMap = L.map('mainMap').setView([17.3850, 78.4867], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(mainMap);
    
    // Add geocoder for address search
    const geocoder = L.Control.geocoder({
        defaultMarkGeocode: true,
        placeholder: 'Search for location...',
        errorMessage: 'Location not found'
    }).addTo(mainMap);
    
    // Click on map to set location for reports
    mainMap.on('click', function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);
        const locStr = lat + ',' + lng;
        
        if (document.getElementById('wasteLoc')) {
            document.getElementById('wasteLoc').value = locStr;
            document.getElementById('trafficLoc').value = locStr;
        }
        
        if (selectedMarker) mainMap.removeLayer(selectedMarker);
        selectedMarker = L.marker([lat, lng]).addTo(mainMap);
        selectedMarker.bindPopup(`📍 Location set: ${lat}, ${lng}`).openPopup();
        
        showToast('📍 Location marked on map');
    });
    
    loadAllReports();
    setInterval(loadAllReports, 15000);
}

// Load all reports and show markers
async function loadAllReports() {
    try {
        const res = await fetch(`${API}/report`);
        const reports = await res.json();
        
        // Clear existing markers
        trafficMarkers.forEach(m => mainMap.removeLayer(m));
        wasteMarkers.forEach(m => mainMap.removeLayer(m));
        trafficMarkers = [];
        wasteMarkers = [];
        
        reports.forEach(report => {
            if (!report.location) return;
            const [lat, lng] = report.location.split(',').map(Number);
            if (isNaN(lat) || isNaN(lng)) return;
            
            const isHighPriority = report.status === 'Pending' && 
                (Date.now() - new Date(report.createdAt || report.reportedAt).getTime()) > 86400000;
            
            let icon, marker;
            
            if (report.type === 'traffic') {
                // Orange T marker for traffic
                const crowdNum = parseInt((report.crowd || '').replace(/[^0-9]/g, '') || '0');
                let bgColor = '#ff8800';
                if (crowdNum >= 5000) bgColor = '#ff0000';
                else if (crowdNum >= 1000) bgColor = '#ff6600';
                
                icon = L.divIcon({
                    html: `<div style="width:32px;height:32px;background:${bgColor};border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;color:white;box-shadow:0 0 10px ${bgColor};">T</div>`,
                    iconSize: [32, 32],
                    className: 'traffic-marker'
                });
                marker = L.marker([lat, lng], { icon }).addTo(mainMap);
                marker.bindPopup(`
                    <b style="color:#ff8800;">🚦 TRAFFIC</b><br>
                    <b>${report.eventName || 'Traffic Event'}</b><br>
                    ${report.description || ''}<br>
                    Crowd: ${report.crowd || 'Unknown'}<br>
                    Status: ${report.status}<br>
                    ${isHighPriority ? '<span style="color:#ff4444;">🔴 HIGH PRIORITY</span>' : ''}
                `);
                trafficMarkers.push(marker);
            } 
            else if (report.type === 'waste') {
                // Green W marker for waste, red if high priority
                const bgColor = isHighPriority ? '#ff0000' : '#7dba3f';
                icon = L.divIcon({
                    html: `<div style="width:32px;height:32px;background:${bgColor};border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;color:white;box-shadow:0 0 10px ${bgColor};">W</div>`,
                    iconSize: [32, 32],
                    className: 'waste-marker'
                });
                marker = L.marker([lat, lng], { icon }).addTo(mainMap);
                marker.bindPopup(`
                    <b style="color:#7dba3f;">🗑️ WASTE</b><br>
                    ${report.description || ''}<br>
                    Status: ${report.status}<br>
                    ${isHighPriority ? '<span style="color:#ff4444;">🔴 HIGH PRIORITY (24h+)</span>' : ''}
                `);
                wasteMarkers.push(marker);
            }
        });
        
    } catch(e) {
        console.error('Error loading reports:', e);
    }
}

// Geocode address to coordinates
async function geocodeAddress(address) {
    // Check if already coordinates
    const coordMatch = address.match(/(-?\d+\.?\d*),\s*(-?\d+\.?\d*)/);
    if (coordMatch) {
        return { lat: parseFloat(coordMatch[1]), lng: parseFloat(coordMatch[2]) };
    }
    
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
        const data = await response.json();
        if (data && data.length > 0) {
            return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }
    } catch(e) {}
    return null;
}

// Get current location
function useCurrentLocation() {
    if (!navigator.geolocation) {
        showToast('Geolocation not supported', true);
        return;
    }
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat = pos.coords.latitude.toFixed(6);
            const lng = pos.coords.longitude.toFixed(6);
            document.getElementById('routeStart').value = `${lat}, ${lng}`;
            showToast('📍 Current location set');
            
            // Show on map
            if (selectedMarker) mainMap.removeLayer(selectedMarker);
            selectedMarker = L.marker([lat, lng]).addTo(mainMap);
            mainMap.setView([lat, lng], 14);
            selectedMarker.bindPopup('📍 Your location').openPopup();
        },
        () => showToast('Unable to get location', true)
    );
}

// Find optimal route using OSRM
async function findOptimalRoute() {
    const startAddr = document.getElementById('routeStart').value;
    const endAddr = document.getElementById('routeEnd').value;
    
    if (!startAddr || !endAddr) {
        showToast('Please enter both start and destination', true);
        return;
    }
    
    showToast('🔍 Finding best route...');
    
    const start = await geocodeAddress(startAddr);
    const end = await geocodeAddress(endAddr);
    
    if (!start || !end) {
        showToast('Could not find location. Try a different address', true);
        return;
    }
    
    // Get route from OSRM (Open Source Routing Machine)
    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?alternatives=true&steps=true&geometries=geojson`;
    
    try {
        const response = await fetch(osrmUrl);
        const data = await response.json();
        
        if (data.code !== 'Ok' || !data.routes || data.routes.length === 0) {
            showToast('No route found', true);
            return;
        }
        
        // Get traffic events that might affect route
        const reportsRes = await fetch(`${API}/report`);
        const reports = await reportsRes.json();
        const trafficEvents = reports.filter(r => r.type === 'traffic' && r.status !== 'Resolved' && r.location);
        
        currentRoutes = data.routes.map((route, idx) => {
            // Check if route passes near traffic events
            const hazards = [];
            for (const event of trafficEvents) {
                if (!event.location) continue;
                const [eventLat, eventLng] = event.location.split(',').map(Number);
                if (isNaN(eventLat) || isNaN(eventLng)) continue;
                
                // Check distance from route to event (simplified)
                let minDist = Infinity;
                for (const coord of route.geometry.coordinates) {
                    const dist = Math.sqrt(Math.pow(coord[1] - eventLat, 2) + Math.pow(coord[0] - eventLng, 2)) * 111;
                    minDist = Math.min(minDist, dist);
                }
                if (minDist < 2) {
                    hazards.push(event);
                }
            }
            
            return {
                id: idx,
                distance: (route.distance / 1000).toFixed(1),
                duration: Math.round(route.duration / 60),
                geometry: route.geometry.coordinates,
                hazardCount: hazards.length,
                hazards: hazards
            };
        });
        
        // Sort by hazard count (fewer hazards first)
        currentRoutes.sort((a, b) => a.hazardCount - b.hazardCount);
        
        displayRouteOptions(currentRoutes, start, end);
        
    } catch(e) {
        console.error('Route error:', e);
        showToast('Error finding route. Using direct line (demo)', true);
        
        // Fallback to straight line
        const directDist = Math.sqrt(Math.pow(end.lat - start.lat, 2) + Math.pow(end.lng - start.lng, 2)) * 111;
        currentRoutes = [{
            id: 0,
            distance: directDist.toFixed(1),
            duration: Math.round(directDist * 2),
            geometry: [[start.lng, start.lat], [end.lng, end.lat]],
            hazardCount: 0
        }];
        displayRouteOptions(currentRoutes, start, end);
    }
}

function displayRouteOptions(routes, start, end) {
    const panel = document.getElementById('routeResultPanel');
    panel.style.display = 'block';
    
    panel.innerHTML = routes.map((route, idx) => `
        <div class="route-option ${idx === 0 ? 'recommended' : ''}" onclick="drawRouteOnMap(${idx}, ${JSON.stringify(start)}, ${JSON.stringify(end)})">
            <div class="route-name">
                ${idx === 0 ? '⭐ RECOMMENDED' : '🔄 Alternative Route'}
                ${route.hazardCount > 0 ? '<span style="color:#ff8888;margin-left:8px;">⚠️ ' + route.hazardCount + ' traffic ahead</span>' : '<span style="color:#7dba3f;margin-left:8px;">✅ Clear route</span>'}
            </div>
            <div class="route-details">
                <span><i class="fas fa-road"></i> ${route.distance} km</span>
                <span><i class="fas fa-clock"></i> ${route.duration} min</span>
            </div>
            ${route.hazards && route.hazards.length > 0 ? `
                <div class="route-warning">
                    ${route.hazards.slice(0, 2).map(h => `⚠️ ${h.eventName || 'Traffic'}`).join(' • ')}
                </div>
            ` : ''}
        </div>
    `).join('');
    
    // Draw the best route by default
    drawRouteOnMap(0, start, end);
}

function drawRouteOnMap(routeIndex, start, end) {
    const route = currentRoutes[routeIndex];
    if (!route) return;
    
    // Remove previous route
    if (drawnRoute) mainMap.removeLayer(drawnRoute);
    
    // Convert coordinates for Leaflet
    const latlngs = route.geometry.map(coord => [coord[1], coord[0]]);
    
    drawnRoute = L.polyline(latlngs, {
        color: routeIndex === 0 ? '#7dba3f' : '#ff8800',
        weight: 5,
        opacity: 0.8,
        lineJoin: 'round'
    }).addTo(mainMap);
    
    // Add start and end markers
    if (window.startMarker) mainMap.removeLayer(window.startMarker);
    if (window.endMarker) mainMap.removeLayer(window.endMarker);
    
    window.startMarker = L.marker([start.lat, start.lng], {
        icon: L.divIcon({ html: '<div style="width:24px;height:24px;background:#28a745;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">S</div>', iconSize: [24, 24] })
    }).addTo(mainMap).bindPopup('🚩 Start');
    
    window.endMarker = L.marker([end.lat, end.lng], {
        icon: L.divIcon({ html: '<div style="width:24px;height:24px;background:#dc3545;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">D</div>', iconSize: [24, 24] })
    }).addTo(mainMap).bindPopup('🏁 Destination');
    
    // Fit bounds to show entire route
    const bounds = L.latLngBounds(latlngs);
    mainMap.fitBounds(bounds);
    
    showToast(`✅ Route displayed on map (${route.distance} km, ${route.duration} min)`);
}

// Camera functions
async function openCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        const video = document.getElementById('cameraVideo');
        video.srcObject = cameraStream;
        video.style.display = 'block';
        document.getElementById('capturedPreview').style.display = 'none';
        document.getElementById('captureBtn').style.display = 'block';
        document.getElementById('closeCamBtn').style.display = 'block';
        document.querySelector('.cam-open').style.display = 'none';
    } catch(err) {
        showToast('Camera access denied', true);
    }
}

function capturePhoto() {
    const video = document.getElementById('cameraVideo');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg', 0.7);
    document.getElementById('capturedPreview').src = capturedImage;
    document.getElementById('capturedPreview').style.display = 'block';
    closeCamera();
    showToast('📸 Photo captured!');
}

function closeCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
    }
    document.getElementById('cameraVideo').style.display = 'none';
    document.getElementById('captureBtn').style.display = 'none';
    document.getElementById('closeCamBtn').style.display = 'none';
    document.querySelector('.cam-open').style.display = 'block';
}

function handleGalleryUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        capturedImage = e.target.result;
        document.getElementById('capturedPreview').src = capturedImage;
        document.getElementById('capturedPreview').style.display = 'block';
        showToast('🖼 Photo loaded!');
    };
    reader.readAsDataURL(file);
}

async function submitWaste() {
    const desc = document.getElementById('wasteDesc').value;
    const loc = document.getElementById('wasteLoc').value;
    if (!desc || !loc) {
        showToast('Please fill description and click on map to mark location', true);
        return;
    }
    
    const report = {
        userId: user.id,
        userName: user.name,
        type: 'waste',
        description: desc,
        location: loc,
        image: capturedImage,
        status: 'Pending'
    };
    
    try {
        const res = await fetch(`${API}/report`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(report)
        });
        if (res.ok) {
            showToast('✅ Waste report submitted!');
            document.getElementById('wasteDesc').value = '';
            document.getElementById('wasteLoc').value = '';
            capturedImage = null;
            document.getElementById('capturedPreview').style.display = 'none';
            if (selectedMarker) mainMap.removeLayer(selectedMarker);
            loadAllReports();
        }
    } catch(e) {
        showToast('Error submitting report', true);
    }
}

async function submitTraffic() {
    const name = document.getElementById('trafficName').value;
    const desc = document.getElementById('trafficDesc').value;
    const crowd = document.getElementById('trafficCrowd').value;
    const loc = document.getElementById('trafficLoc').value;
    
    if (!name || !desc || !loc) {
        showToast('Please fill all fields and click on map to mark location', true);
        return;
    }
    
    const report = {
        userId: user.id,
        userName: user.name,
        type: 'traffic',
        eventName: name,
        description: desc,
        crowd: crowd || 'Moderate',
        location: loc,
        status: 'Pending'
    };
    
    try {
        const res = await fetch(`${API}/report`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(report)
        });
        if (res.ok) {
            showToast('✅ Traffic report submitted!');
            document.getElementById('trafficName').value = '';
            document.getElementById('trafficDesc').value = '';
            document.getElementById('trafficCrowd').value = '';
            document.getElementById('trafficLoc').value = '';
            if (selectedMarker) mainMap.removeLayer(selectedMarker);
            loadAllReports();
        }
    } catch(e) {
        showToast('Error submitting report', true);
    }
}

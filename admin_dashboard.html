<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard – RapidEco</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#7dba3f;--green-bright:#9be15d;--bg:#0f1a0f;--card:#1c2a0c;--border:#2e4414;--text:#e8f5d0;--muted:#8aac60;}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

/* Top Bar */
.topbar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 25px;background:rgba(15,26,15,0.95);backdrop-filter:blur(10px);
    border-bottom:2px solid var(--green);
}
.logo{font-size:24px;font-weight:bold;color:var(--green-bright);}
.logo span{color:white;}
.topbar-right{display:flex;gap:15px;align-items:center;}
.profile-icon{
    display:flex;align-items:center;gap:8px;
    background:var(--card);padding:8px 16px;border-radius:25px;
    border:1px solid var(--border);cursor:pointer;
    transition:all 0.2s;
}
.profile-icon:hover{border-color:var(--green);}
.profile-icon i{font-size:18px;color:var(--green-bright);}
.logout-btn{
    background:#dc3545;border:none;padding:8px 18px;
    border-radius:25px;color:white;cursor:pointer;font-weight:bold;
}
.logout-btn:hover{background:#c82333;}

/* Main Layout - Left Panel Larger */
.main-container{display:flex;height:100vh;padding-top:60px;}
.sidebar{
    width:450px;background:var(--card);border-right:2px solid var(--border);
    display:flex;flex-direction:column;overflow-y:auto;
}
/* Custom Scrollbar */
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-track{background:var(--bg);}
.sidebar::-webkit-scrollbar-thumb{background:var(--green);border-radius:10px;}

/* Navigation Menu */
.nav-menu{
    padding:20px;
    border-bottom:1px solid var(--border);
}
.nav-item{
    display:flex;align-items:center;gap:15px;
    padding:14px 20px;margin-bottom:8px;
    background:rgba(0,0,0,0.2);border-radius:12px;
    cursor:pointer;transition:all 0.3s;
    border-left:3px solid transparent;
}
.nav-item:hover{
    background:rgba(125,186,63,0.15);
    transform:translateX(5px);
}
.nav-item.active{
    background:rgba(125,186,63,0.2);
    border-left-color:var(--green);
}
.nav-item i{
    font-size:22px;width:30px;color:var(--green-bright);
}
.nav-item span{
    font-size:16px;font-weight:600;
}
.nav-item .badge{
    margin-left:auto;
    background:rgba(0,0,0,0.3);
    padding:4px 8px;
    border-radius:20px;
    font-size:11px;
    color:var(--green-bright);
}

/* Content Area inside Sidebar */
.sidebar-content{
    flex:1;
    padding:20px;
    overflow-y:auto;
}
.sidebar-content h3{
    color:var(--green-bright);
    margin-bottom:15px;
    font-size:16px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* Stats Grid */
.stats-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
    margin-bottom:20px;
}
.stat-card{
    background:rgba(0,0,0,0.3);border:1px solid var(--border);
    border-radius:12px;padding:15px;text-align:center;
    transition:all 0.2s;cursor:pointer;
}
.stat-card:hover{border-color:var(--green);transform:translateY(-2px);}
.stat-card .stat-number{font-size:28px;font-weight:800;font-family:'Syne',sans-serif;color:var(--green-bright);}
.stat-card .stat-label{font-size:11px;color:var(--muted);margin-top:5px;}
.stat-card i{font-size:24px;margin-bottom:8px;display:block;color:var(--green-bright);}

/* Filter Bar */
.filter-bar{
    display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;
}
.filter-btn{
    padding:8px 16px;background:#131f0e;border:1px solid var(--border);
    border-radius:25px;font-size:12px;cursor:pointer;color:var(--muted);
    transition:all 0.2s;
}
.filter-btn:hover{border-color:var(--green);color:var(--text);}
.filter-btn.active{
    background:var(--green);color:#0f1a0f;border-color:var(--green);
}

/* Report List */
.report-list{
    display:flex;flex-direction:column;gap:12px;
    max-height:500px;overflow-y:auto;
    padding-right:5px;
}
.report-list::-webkit-scrollbar{width:4px;}
.report-list::-webkit-scrollbar-track{background:var(--bg);}
.report-list::-webkit-scrollbar-thumb{background:var(--green);border-radius:10px;}

.report-item{
    background:rgba(0,0,0,0.3);border:1px solid var(--border);
    border-radius:12px;padding:14px;cursor:pointer;
    transition:all 0.2s;
}
.report-item:hover{border-color:var(--green);transform:translateX(3px);}
.report-item.redzone{border-left:4px solid #ff4444;}
.report-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;flex-wrap:wrap;gap:5px;
}
.report-type{
    font-size:11px;font-weight:bold;padding:4px 10px;border-radius:20px;
}
.type-waste{background:#7dba3f20;color:#7dba3f;}
.type-traffic{background:#f6ad5520;color:#f6ad55;}
.report-status{
    font-size:10px;padding:3px 10px;border-radius:20px;
}
.status-pending{background:#f0a50020;color:#f0a500;}
.status-progress{background:#63b3ed20;color:#63b3ed;}
.status-resolved{background:#5cd68a20;color:#5cd68a;}
.status-rejected{background:#ff555520;color:#ff5555;}
.report-desc{font-size:13px;margin-bottom:8px;font-weight:500;}
.report-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;}
.badge-redzone{background:#ff444420;color:#ff4444;padding:2px 8px;border-radius:12px;font-size:9px;margin-left:8px;}

/* Right Panel - Map Area */
.content-area{flex:1;padding:15px;display:flex;flex-direction:column;gap:15px;}
.map-container{
    background:var(--card);border-radius:16px;overflow:hidden;
    border:1px solid var(--border);height:100%;
    display:flex;flex-direction:column;
}
.map-header{
    padding:12px 20px;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
}
.map-header h3{font-size:16px;color:var(--green-bright);}
.live-badge{font-size:12px;color:var(--muted);}
.live-badge i{color:#ff4444;font-size:8px;margin-right:4px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#mainMap{flex:1;width:100%;min-height:0;}

/* Map Legend */
.map-legend{
    position:absolute;bottom:20px;right:20px;z-index:999;
    background:rgba(15,26,15,.95);border:1px solid var(--border);
    border-radius:12px;padding:12px 16px;font-size:12px;
    backdrop-filter:blur(5px);
}
.map-legend div{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.legend-marker{
    width:28px;height:28px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;font-weight:bold;font-size:12px;
}
.legend-traffic{background:#ff8800;color:white;}
.legend-waste{background:#7dba3f;color:white;}
.legend-redzone{background:#ff0000;color:white;}

/* Toast */
.toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#28a745;color:white;padding:12px 24px;
    border-radius:8px;z-index:1000;display:none;font-size:14px;
}
.empty-state{
    text-align:center;padding:40px;color:var(--muted);
}
.empty-state i{font-size:48px;margin-bottom:15px;opacity:0.5;}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">🌱 Rapid<span>Eco</span> <span style="font-size:12px;color:var(--muted);">| Admin Console</span></div>
    <div class="topbar-right">
        <div class="profile-icon">
            <i class="fas fa-user-shield"></i>
            <span id="adminName">Admin</span>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-container">
    <!-- LEFT PANEL - LARGER SIZE (450px) -->
    <div class="sidebar">
        <!-- Navigation Menu -->
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchSection('overview')">
                <i class="fas fa-chart-line"></i>
                <span>Overview Dashboard</span>
                <div class="badge" id="totalBadge">0</div>
            </div>
            <div class="nav-item" onclick="switchSection('waste')">
                <i class="fas fa-trash-alt"></i>
                <span>Waste Reports</span>
                <div class="badge" id="wasteBadge">0</div>
            </div>
            <div class="nav-item" onclick="switchSection('traffic')">
                <i class="fas fa-traffic-light"></i>
                <span>Traffic Reports</span>
                <div class="badge" id="trafficBadge">0</div>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div class="sidebar-content" id="sidebarContent">
            <!-- Overview Content loads here -->
        </div>
    </div>

    <!-- RIGHT PANEL - MAP -->
    <div class="content-area">
        <div class="map-container">
            <div class="map-header">
                <h3><i class="fas fa-map-marked-alt"></i> Live Complaints Map</h3>
                <div class="live-badge"><i class="fas fa-circle"></i> Auto-refreshing | <span id="lastUpdate">Just now</span></div>
            </div>
            <div id="mainMap"></div>
            <div class="map-legend">
                <div><div class="legend-marker legend-traffic">T</div> <span>Traffic Event</span></div>
                <div><div class="legend-marker legend-waste">W</div> <span>Waste Report</span></div>
                <div><div class="legend-marker legend-redzone">!</div> <span>High Priority (24h+)</span></div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = 'http://localhost:5000';
let mainMap;
let allReports = [];
let markers = [];
let currentSection = 'overview';
let currentWasteFilter = 'all';
let currentTrafficFilter = 'all';

// Authentication
const user = JSON.parse(localStorage.getItem('currentUser'));
if (!user || (user.role !== 'Admin' && user.role !== 'Municipal')) {
    window.location.href = 'login_page.html';
}
document.getElementById('adminName').innerHTML = `<i class="fas fa-user-shield"></i> ${user.name.split(' ')[0] || 'Admin'}`;

function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#dc3545' : '#28a745';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login_page.html';
}

function isRedZone(report) {
    if (report.status === 'Resolved' || report.status === 'Rejected') return false;
    const reportDate = new Date(report.createdAt || report.reportedAt);
    const hoursDiff = (Date.now() - reportDate.getTime()) / (1000 * 60 * 60);
    return hoursDiff >= 24;
}

async function loadReports() {
    try {
        const res = await fetch(`${API}/report`);
        allReports = await res.json();
        
        // Update badges
        const wasteCount = allReports.filter(r => r.type === 'waste').length;
        const trafficCount = allReports.filter(r => r.type === 'traffic').length;
        document.getElementById('totalBadge').innerText = allReports.length;
        document.getElementById('wasteBadge').innerText = wasteCount;
        document.getElementById('trafficBadge').innerText = trafficCount;
        
        updateMap();
        document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
        
        // Reload current section
        if (currentSection === 'overview') loadOverviewContent();
        else if (currentSection === 'waste') loadWasteContent();
        else if (currentSection === 'traffic') loadTrafficContent();
    } catch(e) {
        console.error('Error loading reports:', e);
        showToast('Error loading data', true);
    }
}

function switchSection(section) {
    currentSection = section;
    
    // Update nav active state
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if (section === 'overview') document.querySelector('.nav-item:nth-child(1)').classList.add('active');
    else if (section === 'waste') document.querySelector('.nav-item:nth-child(2)').classList.add('active');
    else if (section === 'traffic') document.querySelector('.nav-item:nth-child(3)').classList.add('active');
    
    // Load content
    if (section === 'overview') loadOverviewContent();
    else if (section === 'waste') loadWasteContent();
    else if (section === 'traffic') loadTrafficContent();
}

function loadOverviewContent() {
    const container = document.getElementById('sidebarContent');
    const total = allReports.length;
    const pending = allReports.filter(r => r.status === 'Pending').length;
    const inProgress = allReports.filter(r => r.status === 'In Progress').length;
    const resolved = allReports.filter(r => r.status === 'Resolved').length;
    const rejected = allReports.filter(r => r.status === 'Rejected').length;
    const redzone = allReports.filter(r => isRedZone(r) && r.status !== 'Resolved' && r.status !== 'Rejected').length;
    
    container.innerHTML = `
        <h3><i class="fas fa-chart-simple"></i> Dashboard Overview</h3>
        
        <div class="stats-grid">
            <div class="stat-card" onclick="showToast('Total reports: ${total}')">
                <i class="fas fa-list"></i>
                <div class="stat-number">${total}</div>
                <div class="stat-label">Total Reports</div>
            </div>
            <div class="stat-card" onclick="showToast('Pending: ${pending}')">
                <i class="fas fa-hourglass-half"></i>
                <div class="stat-number">${pending}</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card" onclick="showToast('In Progress: ${inProgress}')">
                <i class="fas fa-spinner"></i>
                <div class="stat-number">${inProgress}</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card" onclick="showToast('Resolved: ${resolved}')">
                <i class="fas fa-check-circle"></i>
                <div class="stat-number">${resolved}</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-card" onclick="showToast('Rejected: ${rejected}')">
                <i class="fas fa-times-circle"></i>
                <div class="stat-number">${rejected}</div>
                <div class="stat-label">Rejected</div>
            </div>
            <div class="stat-card" onclick="showToast('Red Zone: ${redzone} complaints >24h')">
                <i class="fas fa-exclamation-triangle"></i>
                <div class="stat-number">${redzone}</div>
                <div class="stat-label">Red Zone (24h+)</div>
            </div>
        </div>
        
        <div style="margin:15px 0 10px;">
            <span style="font-size:13px;color:var(--green-bright);"><i class="fas fa-clock"></i> Recent Reports</span>
        </div>
        <div id="overviewReportsList" class="report-list"></div>
    `;
    
    // Load recent reports (last 10)
    const recentReports = [...allReports].reverse().slice(0, 10);
    const reportsContainer = document.getElementById('overviewReportsList');
    
    if (recentReports.length === 0) {
        reportsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>No reports yet</div>';
    } else {
        reportsContainer.innerHTML = recentReports.map(report => {
            const rz = isRedZone(report);
            const statusClass = (report.status || 'pending').toLowerCase().replace(' ', '-');
            return `
                <div class="report-item ${rz ? 'redzone' : ''}" onclick="zoomToReport('${report.location}')">
                    <div class="report-header">
                        <span class="report-type ${report.type === 'waste' ? 'type-waste' : 'type-traffic'}">
                            ${report.type === 'waste' ? '🗑️ Waste' : '🚦 Traffic'}
                        </span>
                        <div>
                            <span class="report-status status-${statusClass}">${report.status || 'Pending'}</span>
                            ${rz ? '<span class="badge-redzone">🔴 24h+</span>' : ''}
                        </div>
                    </div>
                    <div class="report-desc">${(report.description || report.eventName || '-').substring(0, 80)}</div>
                    <div class="report-meta">
                        <span><i class="fas fa-user"></i> ${report.userName || 'Unknown'}</span>
                        <span><i class="far fa-clock"></i> ${new Date(report.createdAt || report.reportedAt).toLocaleString()}</span>
                    </div>
                </div>
            `;
        }).join('');
    }
}

function loadWasteContent() {
    const container = document.getElementById('sidebarContent');
    let wasteReports = allReports.filter(r => r.type === 'waste');
    
    container.innerHTML = `
        <h3><i class="fas fa-trash-alt"></i> Waste Management Reports</h3>
        
        <div class="stats-grid">
            <div class="stat-card" onclick="filterWasteReports('all')">
                <i class="fas fa-list"></i>
                <div class="stat-number">${wasteReports.length}</div>
                <div class="stat-label">Total Waste</div>
            </div>
            <div class="stat-card" onclick="filterWasteReports('pending')">
                <i class="fas fa-hourglass-half"></i>
                <div class="stat-number">${wasteReports.filter(r => r.status === 'Pending').length}</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card" onclick="filterWasteReports('progress')">
                <i class="fas fa-spinner"></i>
                <div class="stat-number">${wasteReports.filter(r => r.status === 'In Progress').length}</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card" onclick="filterWasteReports('resolved')">
                <i class="fas fa-check-circle"></i>
                <div class="stat-number">${wasteReports.filter(r => r.status === 'Resolved').length}</div>
                <div class="stat-label">Resolved</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <button class="filter-btn ${currentWasteFilter === 'all' ? 'active' : ''}" onclick="filterWasteReports('all')">All Waste</button>
            <button class="filter-btn ${currentWasteFilter === 'pending' ? 'active' : ''}" onclick="filterWasteReports('pending')">Pending</button>
            <button class="filter-btn ${currentWasteFilter === 'progress' ? 'active' : ''}" onclick="filterWasteReports('progress')">In Progress</button>
            <button class="filter-btn ${currentWasteFilter === 'resolved' ? 'active' : ''}" onclick="filterWasteReports('resolved')">Resolved</button>
        </div>
        
        <div id="wasteReportsList" class="report-list"></div>
    `;
    
    filterWasteReports(currentWasteFilter);
}

function filterWasteReports(filter) {
    currentWasteFilter = filter;
    let filtered = allReports.filter(r => r.type === 'waste');
    
    if (filter === 'pending') filtered = filtered.filter(r => r.status === 'Pending');
    else if (filter === 'progress') filtered = filtered.filter(r => r.status === 'In Progress');
    else if (filter === 'resolved') filtered = filtered.filter(r => r.status === 'Resolved');
    
    const container = document.getElementById('wasteReportsList');
    if (!container) return;
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-trash-alt"></i><br>No waste reports found</div>';
        return;
    }
    
    container.innerHTML = filtered.map(report => {
        const rz = isRedZone(report);
        return `
            <div class="report-item ${rz ? 'redzone' : ''}" onclick="zoomToReport('${report.location}')">
                <div class="report-header">
                    <span class="report-type type-waste">🗑️ Waste</span>
                    <span class="report-status status-${(report.status || 'pending').toLowerCase().replace(' ', '-')}">
                        ${report.status || 'Pending'}
                    </span>
                </div>
                <div class="report-desc">${(report.description || '-').substring(0, 80)}</div>
                <div class="report-meta">
                    <span><i class="fas fa-user"></i> ${report.userName || 'Unknown'}</span>
                    <span><i class="far fa-calendar"></i> ${new Date(report.createdAt || report.reportedAt).toLocaleDateString()}</span>
                </div>
                ${report.assignedWorker ? `<div class="report-meta" style="margin-top:5px;"><i class="fas fa-user-hard-hat"></i> Worker: ${report.assignedWorker}</div>` : ''}
            </div>
        `;
    }).join('');
}

function loadTrafficContent() {
    const container = document.getElementById('sidebarContent');
    let trafficReports = allReports.filter(r => r.type === 'traffic');
    
    container.innerHTML = `
        <h3><i class="fas fa-traffic-light"></i> Traffic Management Reports</h3>
        
        <div class="stats-grid">
            <div class="stat-card" onclick="filterTrafficReports('all')">
                <i class="fas fa-list"></i>
                <div class="stat-number">${trafficReports.length}</div>
                <div class="stat-label">Total Traffic</div>
            </div>
            <div class="stat-card" onclick="filterTrafficReports('pending')">
                <i class="fas fa-hourglass-half"></i>
                <div class="stat-number">${trafficReports.filter(r => r.status === 'Pending').length}</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card" onclick="filterTrafficReports('progress')">
                <i class="fas fa-spinner"></i>
                <div class="stat-number">${trafficReports.filter(r => r.status === 'In Progress').length}</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card" onclick="filterTrafficReports('resolved')">
                <i class="fas fa-check-circle"></i>
                <div class="stat-number">${trafficReports.filter(r => r.status === 'Resolved').length}</div>
                <div class="stat-label">Resolved</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <button class="filter-btn ${currentTrafficFilter === 'all' ? 'active' : ''}" onclick="filterTrafficReports('all')">All Traffic</button>
            <button class="filter-btn ${currentTrafficFilter === 'pending' ? 'active' : ''}" onclick="filterTrafficReports('pending')">Pending</button>
            <button class="filter-btn ${currentTrafficFilter === 'progress' ? 'active' : ''}" onclick="filterTrafficReports('progress')">In Progress</button>
            <button class="filter-btn ${currentTrafficFilter === 'resolved' ? 'active' : ''}" onclick="filterTrafficReports('resolved')">Resolved</button>
        </div>
        
        <div id="trafficReportsList" class="report-list"></div>
    `;
    
    filterTrafficReports(currentTrafficFilter);
}

function filterTrafficReports(filter) {
    currentTrafficFilter = filter;
    let filtered = allReports.filter(r => r.type === 'traffic');
    
    if (filter === 'pending') filtered = filtered.filter(r => r.status === 'Pending');
    else if (filter === 'progress') filtered = filtered.filter(r => r.status === 'In Progress');
    else if (filter === 'resolved') filtered = filtered.filter(r => r.status === 'Resolved');
    
    const container = document.getElementById('trafficReportsList');
    if (!container) return;
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-traffic-light"></i><br>No traffic reports found</div>';
        return;
    }
    
    container.innerHTML = filtered.map(report => {
        const rz = isRedZone(report);
        return `
            <div class="report-item ${rz ? 'redzone' : ''}" onclick="zoomToReport('${report.location}')">
                <div class="report-header">
                    <span class="report-type type-traffic">🚦 Traffic</span>
                    <span class="report-status status-${(report.status || 'pending').toLowerCase().replace(' ', '-')}">
                        ${report.status || 'Pending'}
                    </span>
                </div>
                <div class="report-desc">${(report.eventName || report.description || '-').substring(0, 80)}</div>
                <div class="report-meta">
                    <span><i class="fas fa-user"></i> ${report.userName || 'Unknown'}</span>
                    <span><i class="far fa-calendar"></i> ${new Date(report.createdAt || report.reportedAt).toLocaleDateString()}</span>
                </div>
            </div>
        `;
    }).join('');
}

function updateMap() {
    if (mainMap) mainMap.remove();
    
    mainMap = L.map('mainMap').setView([17.3850, 78.4867], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(mainMap);
    
    markers = [];
    
    allReports.forEach(report => {
        if (!report.location) return;
        const [lat, lng] = report.location.split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) return;
        
        const isHigh = isRedZone(report);
        let bgColor, letter;
        
        if (report.type === 'traffic') {
            bgColor = isHigh ? '#ff0000' : '#ff8800';
            letter = 'T';
        } else {
            bgColor = isHigh ? '#ff0000' : '#7dba3f';
            letter = 'W';
        }
        
        const icon = L.divIcon({
            html: `<div style="width:34px;height:34px;background:${bgColor};border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;color:white;box-shadow:0 0 12px ${bgColor};">${letter}</div>`,
            iconSize: [34, 34],
            className: 'custom-marker'
        });
        
        const marker = L.marker([lat, lng], { icon }).addTo(mainMap);
        marker.bindPopup(`
            <div style="min-width:220px;">
                <b style="color:${bgColor};font-size:14px;">${report.type === 'waste' ? '🗑️ WASTE' : '🚦 TRAFFIC'}</b>
                ${isHigh ? '<div style="color:#ff4444;margin:5px 0;">🔴 HIGH PRIORITY (24h+)</div>' : ''}
                <div style="margin:8px 0;"><strong>${report.description || report.eventName || '-'}</strong></div>
                <div><i class="fas fa-user"></i> ${report.userName || 'Unknown'}</div>
                <div><i class="fas fa-tag"></i> ${report.status || 'Pending'}</div>
                <div><i class="far fa-calendar"></i> ${new Date(report.createdAt || report.reportedAt).toLocaleString()}</div>
            </div>
        `);
        markers.push(marker);
    });
}

function zoomToReport(locationStr) {
    if (!locationStr) return;
    const [lat, lng] = locationStr.split(',').map(Number);
    if (isNaN(lat) || isNaN(lng)) return;
    mainMap.setView([lat, lng], 15);
    showToast(`📍 Zooming to location`);
}

// Make functions global
window.switchSection = switchSection;
window.filterWasteReports = filterWasteReports;
window.filterTrafficReports = filterTrafficReports;
window.zoomToReport = zoomToReport;
window.showToast = showToast;

// Initialize
loadReports();
setInterval(loadReports, 15000);
</script>
